upstream focalboard {
    server focalboard:8000;
}

# HTTP — redirect all traffic to HTTPS when certificates are in place,
# or serve directly on port 80 for plain-HTTP setups.
server {
    listen 80;
    listen [::]:80;

    # Replace with your domain or public IP address.
    server_name _;

    # Uncomment the block below to redirect HTTP → HTTPS once you have TLS certs.
    # return 301 https://$host$request_uri;

    client_max_body_size 50M;

    location / {
        proxy_pass         http://focalboard;
        proxy_http_version 1.1;

        # WebSocket support (required by Focalboard real-time sync).
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

