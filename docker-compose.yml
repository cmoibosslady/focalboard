services:
  nginx:
    container_name: reverse-nginx
    restart: always
    build:
      context: ./src/requirements/nginx
    ports:
      - "8080:443"
    env_file:
      - ./src/.env
    networks:
      - my-network

  focalboard:
    container_name: focalboard
    restart: always
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    depends_on:
      postgresql:
        condition: service_healthy
    build:
      context: ./src/requirements/focalboard
    ports:
      - "8000"
    env_file:
      - ./src/.env
    volumes:
      - focalboard-data:/var/lib/focalboard/data
    secrets:
      - db_credentials
    networks:
      - my-network

  postgresql:
    container_name: postgresql
    restart: always
    build:
      context: ./src/requirements/postgresql
    ports:
      - "5432"
    env_file:
      - ./src/.env
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    secrets:
      - db_credentials
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "db_prod"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - my-network
  

networks:
  my-network:

volumes:
  postgresql-data:
    driver: local
    driver_opts:
      type: none
      device: ${HOME}/data/postgresql
      o: bind

  focalboard-data:
    driver: local
    driver_opts:
      type: none
      device: ${HOME}/data/focalboard
      o: bind

secrets:
  db_credentials:
    file: ./secrets/postgres_credentials.txt
